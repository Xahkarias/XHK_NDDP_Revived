l_polish:
  
  ### MEGASTRUCTURE
  
  xhk_name_nddp:99 "Nicoll Dyson Defense Platform"
  xhk_nicoll_dyson_defense_0:99 "$xhk_name_nddp$ Construction Site"
  xhk_nicoll_dyson_defense_0_DESC:99 "The construction site where a $xhk_name_nddp$ shall be constructed."
  xhk_nicoll_dyson_defense_0_MEGASTRUCTURE_DETAILS:99 "$giga_list_category_gigastructure$ - §MANTI-PLANETCRAFT DEFENSE§!\nA massive structure weaponizing the power of a entire star onto a beam capable of destroying the most powerful of ships."
  xhk_nicoll_dyson_defense_1:99 "$xhk_name_nddp$ Dyson Sphere"
  xhk_nicoll_dyson_defense_1_DESC:99 "A modified dyson sphere to collect the power of the star."
  
  xhk_nicoll_dyson_defense_2:99 "$xhk_name_nddp$ Capacitor Rings"
  xhk_nicoll_dyson_defense_2_DESC:99 "These massive rings encircling the star serve to store the energy from the star and direct it towards the main gun."
  
  xhk_nicoll_dyson_defense_3:99 "$xhk_name_nddp$"
  xhk_nicoll_dyson_defense_3_DESC:99 "A finished $xhk_name_nddp$, capable of weaponizing a entire star."
  
  xhk_nicoll_dyson_ruined:99 "Destroyed $xhk_name_nddp$"
  xhk_nicoll_dyson_ruined_DESC:99 "This massive defense platform once able to weaponize the might of a entire star is now in disarray, but repairs seem possible."
  
  xhk_nicoll_dyson_repaired:99 "Repaired $xhk_name_nddp$"
  xhk_nicoll_dyson_repaired_DESC:99 "Repairing this structure will be a massive task but will allow us to defend this system against any threats."
  
  ### BUILD STAGES EVENTS
  xhk_ndb.100.title:99 "$xhk_nicoll_dyson_defense_0$ Finished"
  xhk_ndb.100.desc:99 "We have begun the construction of a massive defense platform in the [event_target:xhk_event_system.GetName] system. Once finished this might structure will weaponize the power of a entire star to defend against any threats."
  
  xhk_ndb.101.title:99 "$xhk_nicoll_dyson_defense_1$ Finished"
  xhk_ndb.101.desc:99 "We have finished the construction of a modified Dyson sphere for the $xhk_name_nddp$, while not capable of producing energy usable by our infrastructure this structure will soon power the massive weapon array of the system's main defense."
  
  xhk_ndb.102.title:99 "$xhk_nicoll_dyson_defense_2$ Finished"
  xhk_ndb.102.desc:99 "We have finished construction of the capacitor rings for the $xhk_name_nddp$, this massive rings will store the enormous amounts of energy created by the star and redirect it towards the weapon when needed."
  
  xhk_ndb.103.title:99 "$xhk_nicoll_dyson_defense_3$ Finished"
  xhk_ndb.103.desc:99 "We have finished the main weapon array of the $xhk_name_nddp$, with this the structure is now finished and ready to defend [event_target:xhk_event_system.GetName] against any threats."
  
  xhk_ndb.104.title:99 "$xhk_name_nddp$ Repaired"
  xhk_ndb.104.desc:99 "We have finished repairing the $xhk_name_nddp$ in [event_target:xhk_event_system.GetName], this structure will now be able to protect the system against any threats."
  
  
  ### TECHS
  tech_xhk_nicoll_dyson:99 "$xhk_name_nddp$"
  tech_xhk_nicoll_dyson_desc:99 "A massive structure built around a star, capable of weaponizing it's energy production."
  
  tech_xhk_ndb_supernova:99 "Emergency Supernova System"
  tech_xhk_ndb_supernova_desc:99 "Anything capable of destroying a $xhk_name_nddp$ is definitely a powerful force, we can use a dark matter charge to collapse the star the structure is defending to wipe the system."
  
  TECH_UNLOCK_NDB_SUPERNOVA:99 "§EEnables Supernova Emergency Protocol§!"
  TECH_UNLOCK_NDB_SUPERNOVA_DESC:99 "Gives us the §Moption§! to detonate the star once a $xhk_name_nddp$ is destroyed."
  
  tech_xhk_repeatable_ndb_damage:99 "Stellar Scale Capacitors"
  tech_xhk_repeatable_ndb_damage_desc:99 "By improving the capacitors on the $xhk_name_nddp$ we can allow it to store more energy increasing the power of the beams."
  
  tech_xhk_repeatable_ndb_fire_rate:99 "Stellar Scale Cooling"
  tech_xhk_repeatable_ndb_fire_rate_desc:99 "Much of the energy generated by the $xhk_name_nddp$ is wasted by cooling a structure so close to a star, with more efficient cooling systems more energy can be used for the main weapon."
  
  TECH_NDB_DAMAGE_REPEAT:99 "Increases damage of the $xhk_name_nddp$ main weapon"
  TECH_NDB_FIRE_RATE_REPEAT:99 "Increases fire rate of the $xhk_name_nddp$ main weapon"
  
  ### DECISION
  xhk_nddp_decision_claim_system_nddp:99 "Claim Wrecked Nicoll Dyson Defense Platform"
  xhk_nddp_decision_claim_system_nddp_desc:99 "If this system contains wrecked Nicoll Dyson Defense Platforms which we do not own, this decision lets us assert our rightful claims."
  xhk_nddp_decision_claim_system_nddp_effect:99 "This will transfer all §YRuined Nicoll Dyson Defense Platforms§! within this system to our direct control."
  
  
  ### SHIP
  xhk_nicoll_dyson:99 "$xhk_name_nddp$"
  xhk_nicoll_dyson_cap:99 "$xhk_name_nddp$"
  
  XHK_NICOLL_DYSON_BOW:99 "Main Weapon Arrays"
  XHK_NICOLL_DYSON_MID:99 "Secondary Stellar Arrays"
  XHK_NICOLL_DYSON_MID2:99 "Tertiary Stellar Arrays"
  XHK_NICOLL_DYSON_STERN:99 "Backup Weapons Systems"
  
  XHK_NDB_REACTOR:99 "Captive Star"
  XHK_NDB_REACTOR_DESC:99 "This structure is built around a star and can utilize all of it's power"
  
  XHK_NDB_MAIN:99 "Nicoll Dyson Beam"
  XHK_NDB_MAIN_DESC:99 "The main weapon of the structure, a single beam of energy containing the power of a star."
  
  XHK_NDB_SECONDARY:99 "Secondary Stellar Lasers"
  XHK_NDB_SECONDARY_DESC:99 "Massive arrays of lasers using leftover power from the main weapon."
  
  XHK_NDDP_COMBAT_COMPUTER_PLATFORM_DEFAULT:99 "$COMBAT_COMPUTER_PLATFORM_DEFAULT$"
  XHK_NDDP_COMBAT_COMPUTER_PLATFORM_DEFAULT_DESC:99 "$COMBAT_COMPUTER_PLATFORM_DEFAULT_DESC$"
  XHK_NDDP_COMBAT_COMPUTER_PLATFORM_BASIC:99 "$COMBAT_COMPUTER_PLATFORM_BASIC$"
  XHK_NDDP_COMBAT_COMPUTER_PLATFORM_BASIC_DESC:99 "$COMBAT_COMPUTER_PLATFORM_BASIC_DESC$"
  XHK_NDDP_COMBAT_COMPUTER_PLATFORM_ADVANCED:99 "$COMBAT_COMPUTER_PLATFORM_ADVANCED$"
  XHK_NDDP_COMBAT_COMPUTER_PLATFORM_ADVANCED_DESC:99 "$COMBAT_COMPUTER_PLATFORM_ADVANCED_DESC$"
  XHK_NDDP_COMBAT_COMPUTER_PLATFORM_SAPIENT:99 "$COMBAT_COMPUTER_PLATFORM_SAPIENT$"
  XHK_NDDP_COMBAT_COMPUTER_PLATFORM_SAPIENT_DESC:99 "$COMBAT_COMPUTER_PLATFORM_SAPIENT$"
  XHK_NDDP_COMBAT_COMPUTER_PLATFORM_AUTONOMOUS:99 "$COMBAT_COMPUTER_PLATFORM_AUTONOMOUS$"
  XHK_NDDP_COMBAT_COMPUTER_PLATFORM_AUTONOMOUS_DESC:99 "$COMBAT_COMPUTER_PLATFORM_AUTONOMOUS$"
  XHK_NDDP_COMBAT_COMPUTER_PLATFORM_PRECOG:99 "$COMBAT_COMPUTER_PLATFORM_PRECOG$"
  XHK_NDDP_COMBAT_COMPUTER_PLATFORM_PRECOG_DESC:99 "$COMBAT_COMPUTER_PLATFORM_PRECOG_DESC$"
  
  weapon_type_ndb:99 "Nicoll Dyson Beam §R(This is not a energy weapon)§!"
  
  ### EVENTS
  xhk_ndb.1000.title:99 "$xhk_name_nddp$ Destroyed!"
  xhk_ndb.1000.desc:99 "Our $xhk_name_nddp$ was destroyed after a massive battle in the [system.GetName] system. The structure was exposed to heavy fire and finally collapsed leaving the system vulnerable to enemy forces that are still at large. However much of the structure remains in stable orbit around the star and repairs would be possible."
  
  xhk_ndb.1000.a:99 "Curses!"
  xhk_ndb.1000.a.tooltip:99 "The $xhk_name_nddp$ is now ruined and must be repaired."
  
  xhk_ndb.1000.b:99 "This battle is doomed. Collapse the star"
  xhk_ndb.1000.b.tooltip:99 "A dark matter charge will be used to collapse the star causing a massive supernova. §REverything in the system will be destroyed!§!"